spring.application.name=EsameReact_be
server.port=8080

# ── PostgreSQL (Supabase) ───────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-eu-central-1.pooler.supabase.com:6543/postgres}
spring.datasource.username=${DB_USERNAME:postgres.edmhavkcqraliisitlju}
# INSERISCI LA TUA PASSWORD VERA AL POSTO DI "la_tua_password_supabase"
spring.datasource.password=${DB_PASSWORD:123_Prova!!}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# IMPOSTATO SU UPDATE: Crea/aggiorna le tabelle nel nuovo DB Supabase.
# Dopo il primo avvio, se vuoi, puoi rimetterlo a 'validate' per sicurezza.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── JWT ─────────────────────────────────────────────────────────────────────
# Cambiare in produzione: deve essere una stringa casuale di almeno 32 caratteri
jwt.secret=${JWT_SECRET:cambia-questa-chiave-segreta-in-produzione-minimo32c}
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
# Refresh token: 7 giorni
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

